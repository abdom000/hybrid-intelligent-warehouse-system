name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Validate and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate mock data
        run: python scripts/validate_mock_data.py

      - name: Validate shared schemas
        run: python scripts/validate_schemas.py

      - name: Validate shelf recognition
        run: python scripts/validate_shelf_recognition.py

      - name: Validate ML integration
        run: python scripts/validate_ml_integration.py

      - name: Run ML end-to-end demo
        run: python scripts/run_ml_end_to_end_demo.py

      - name: Run full hybrid system demo
        run: python scripts/run_full_demo.py

      - name: Run tests
        run: pytest
